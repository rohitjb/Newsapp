# .swiftlint.yml
included:
  - NewsApp
  - NewsCompanion
  - Packages

excluded:
  - .build
  - DerivedData
  - NewsApp.xcodeproj

disabled_rules:
  - trailing_whitespace

opt_in_rules:
  - empty_count
  - explicit_init
  - closure_spacing
  - overridden_super_call
  - redundant_nil_coalescing

analyzer_rules:
  - unused_import

line_length:
  warning: 120
  error: 150

type_body_length:
  warning: 300
  error: 400

file_length:
  warning: 400
  error: 600

function_body_length:
  warning: 40
  error: 60

cyclomatic_complexity:
  warning: 10
  error: 15
