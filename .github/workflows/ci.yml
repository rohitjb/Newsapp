name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

  test:
    name: Test
    needs: lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Write Secrets.xcconfig
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: echo "NEWSAPI_KEY = $NEWSAPI_KEY" > Secrets.xcconfig

      - name: Install xcpretty
        run: gem install xcpretty

      - name: Install Mockoon CLI
        run: npm install -g @mockoon/cli

      - name: Start Mockoon
        run: |
          mockoon-cli start --data MockData/mockoon-config.json --port 3000 &
          sleep 3

      - name: Run tests
        run: |
          xcodebuild test \
            -scheme NewsApp \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            | xcpretty

      - name: Convert coverage to Sonar format
        run: |
          xccov view --report --json TestResults.xcresult > coverage.json
          python3 -c "
          import json
          with open('coverage.json') as f:
              data = json.load(f)
          print('<?xml version=\"1.0\" ?>')
          print('<coverage version=\"1\">')
          for target in data.get('targets', []):
              for file in target.get('files', []):
                  path = file.get('path', '')
                  coverage = file.get('lineCoverage', 0)
                  print(f'  <file path=\"{path}\" line-rate=\"{coverage}\"/>')
          print('</coverage>')
          " > coverage.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  sonar:
    name: SonarCloud
    needs: test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
